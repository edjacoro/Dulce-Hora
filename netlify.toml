[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.18.0"
  PNPM_VERSION = "11.7.0"

[functions]
  directory = "netlify/functions"
  included_files = ["server/migrations/*.sql"]
  node_bundler = "esbuild"

[functions.api]
  memory = "2gb"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
