[build]
  command = "pnpm build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  included_files = ["server/migrations/*.sql"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
